# Comparison run using the legacy bracket-boundary age transitions, where
# disability acquisition is tested only when a household ages into the next
# ten-year bracket. The canonical run (configs/baseline.yaml) uses
# annual_interpolated transitions.
run:
  name: bracket_boundary
  input_path: data/processed/model_inputs.csv
  output_dir: results/bracket_boundary
  seed: 123
  n_props: 50000
  horizon_years: 20
  return_time_stats: true
  age_transition_mode: bracket_boundary
  start_year: 2022

input:
  sheet: 0

transition_model:
  type: trend
  trend: none
  base_year: 2022

scenarios:
  - name: main_inmover_first
    disabled_tenure_factor: 1.0
    rate_scale: 1.0
  - name: sdac_2003_2022_trend
    disabled_tenure_factor: 1.0
    rate_scale: 1.0
    trend: sdac_2003_2022_trend
  - name: sdac_2015_2022_trend
    disabled_tenure_factor: 1.0
    rate_scale: 1.0
    trend: sdac_2015_2022_trend
  - name: sens_disabled_tenure_1p2
    disabled_tenure_factor: 1.2
    rate_scale: 1.0
  - name: selection_scale_0p9
    disabled_tenure_factor: 1.0
    rate_scale: 0.9
