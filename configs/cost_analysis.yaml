# Retrofit vs. accessible-new-build cost comparison.
#
# Compares, for the projected NSW and WA new-home builds, the NPV of:
#   (a) building every new home accessible up front, vs
#   (b) retrofitting each home when it is first occupied by a household with a
#       (physical / any) disability, using the model's first-occupancy CDF.
# See docs/cost_analysis.md for the full methodology.

costs:
  # Per-dwelling costs in nominal dollars of `base_year`, from the Centre for
  # International Economics Decision Regulation Impact Statement (CIE DRIS) on
  # minimum accessibility standards in the National Construction Code.
  # Per-type costs are weighted into per-state figures using the new-dwelling
  # structure-type mix in `dwelling_mix_csv` (see docs/cost_analysis.md).
  base_year: 2021
  # New-build cost of Silver-level (Option 1) accessibility per dwelling: CIE
  # DRIS table 6.1 (non-exempt dwellings), DCWC construction cost adjusted to
  # the national average plus the net opportunity cost of space.
  new_build_by_type:
    house: 3874
    townhouse: 4186
    apartment: 5748
  # Mandate overhead added to every new dwelling: compliance verification
  # (CIE central case, $200/dwelling) plus one-off government + industry
  # transition/retraining costs ($28.47M spread over ~1.90M national
  # completions in a 10-year regulatory period, ~$15/dwelling).
  new_build_mandate_overhead: 215
  # Average cost of tailored home modifications per modified dwelling at
  # Silver-level (Option 1) unit costs — NOT a full Silver retrofit. CIE DRIS
  # table 3.32 / appendix D: $18,821 Class 1a (houses and townhouses),
  # $20,260 Class 2 (apartments), 2021 dollars.
  # Conservative: wheelchair users' Gold-level costs ($49,706) are excluded.
  retrofit_by_type:
    house: 18821
    townhouse: 18821
    apartment: 20260

# New-dwelling structure-type mix (share of houses / townhouses / apartments
# commenced over the most recent 3 years, ABS 8752.0 Building Activity), built
# by scripts/build_dwelling_mix.py. Used to weight the per-type costs above.
dwelling_mix_csv: data/processed/dwelling_mix.csv

analysis:
  # NPV reference year. Costs are anchored to the March-quarter construction
  # index of this year (the last observed quarter) and inflated forward at the
  # state-specific historical average rate.
  start_year: 2026
  # New homes are assumed built in equal annual cohorts over this many years,
  # starting in start_year.
  buildout_years: 5
  # Nominal discount rate: approximate 10-year Australian government bond yield.
  discount_rate: 0.048
  # Forward construction cost inflation = average year-on-year change of the
  # March-quarter house construction index over these years (inclusive; the
  # first entry is the change ending in that year). 2000-2019 deliberately
  # excludes the COVID-era spike.
  inflation_window: [2000, 2019]
  # Model scenario whose first-occupancy CDF feeds the retrofit arm.
  scenario: main_inmover_first

# Projected new homes over the build-out period, from the National Housing
# Accord state breakdown.
states:
  nsw:
    new_homes: 376000
  wa:
    new_homes: 129000
