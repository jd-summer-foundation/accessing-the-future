run:
  name: baseline
  input_path: data/processed/model_inputs.csv
  output_dir: results/baseline
  seed: 123
  n_props: 44346
  horizon_years: 20
  return_time_stats: true
  start_year: 2022

input:
  sheet: 0

transition_model:
  type: trend
  trend: none        # only 'none' implemented in this step
  base_year: 2022    # must equal run.start_year

scenarios:
  - name: main_inmover_first
    first_draw_source: inmover
    disabled_tenure_factor: 1.0
    rate_scale: 1.0
  - name: sens_general_first
    first_draw_source: general
    disabled_tenure_factor: 1.0
    rate_scale: 1.0
  - name: sens_disabled_tenure_1p2
    first_draw_source: inmover
    disabled_tenure_factor: 1.2
    rate_scale: 1.0
  - name: selection_scale_0p9
    first_draw_source: inmover
    disabled_tenure_factor: 1.0
    rate_scale: 0.9
  - name: sdac_2003_2022_trend
    first_draw_source: inmover
    disabled_tenure_factor: 1.0
    rate_scale: 1.0
    trend: sdac_2003_2022_trend
