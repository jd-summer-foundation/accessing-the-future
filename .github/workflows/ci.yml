name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock.txt

      - name: Build processed inputs
        run: make build-data

      - name: Run tests
        run: python -m pytest

      - name: Run smoke reproduction
        run: make smoke
